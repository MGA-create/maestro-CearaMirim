<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maestro - SMEB</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="apple-touch-icon" href="icone.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A3D6B">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F8F9FA; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .container {
            text-align: center; padding: 20px; background: white;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 80%; max-width: 400px;
        }
        .logo-placeholder {
            width: 100px; height: 100px; margin: 0 auto 20px auto;
        }
        .logo-placeholder img {
            width: 100%; height: 100%; object-fit: contain;
        }
        h1 { margin: 0 0 10px 0; color: #0A3D6B; font-size: 22px; }
        p { color: #6B7280; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .btn {
            display: block; width: 100%; padding: 14px;
            background-color: #0A3D6B; color: white; text-decoration: none;
            border-radius: 8px; font-weight: bold; font-size: 16px;
            border: none; cursor: pointer; transition: background 0.3s;
            box-sizing: border-box;
        }
        .btn:active { background-color: #062847; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">
            <img src="icone.png" alt="Logo Maestro">
        </div>
        
        <h1>Portal Maestro</h1>
        <p>Sistema Integrado de Mobilidade Estudantil. Aceda de forma segura aos servidores da Secretaria.</p>
        
        <button class="btn" onclick="acessarSistema()">Aceder ao Portal</button>
    </div>

    <script>
        function acessarSistema() {
            // Este redirecionamento resolve o bloqueio da câmara e de contas Google
            var urlGoogleScript = "https://script.google.com/macros/s/AKfycbzJdHCjPXFpwVLhXuO0--bJJnkwa0vQDL8dRaGTB5ASCW4tBqk_-MEoZqxS9FSrbo40/exec";
            window.location.href = urlGoogleScript;
        }
    </script>

</body>
</html>
