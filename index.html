<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maestro - SMEB</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="apple-touch-icon" href="icone.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A3D6B">

    <style>
        /* Remove qualquer margem branca e oculta as barras de scroll da capa */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #F8F9FA; 
        }
        /* O Iframe ocupa 100% da tela e engole o seu sistema do Apps Script */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbzwCDjHHpzjslVW-Zh6VzxeHPK0RwtrBcbUSLP83n_5pYaKzN56k4wM55HXjIQj1ZnW/exec"></iframe>
</body>
</html>
