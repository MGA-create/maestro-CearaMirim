<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Fora da Rota | Portal Maestro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    <style>
        :root {
            --primary: #0A3D6B;
            --accent: #F29900;
            --secondary: #F8F9FA;
            --text-main: #1F2937;
            --text-sub: #6B7280;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--secondary);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 400px;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin: 20px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        p {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s, background 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .timer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="icon">🚌</span>
        <h1>OPS! FORA DA ROTA</h1>
        <p>Parece que o caminho que digitou não existe ou foi alterado. Não se preocupe, vamos levá-lo de volta.</p>
        
        <a href="index.html" class="btn">VOLTAR AO INÍCIO</a>

        <div class="timer">
            A redirecionar em <span id="countdown">5</span> segundos...
        </div>
    </div>

    <script>
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
